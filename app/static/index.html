<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List Application</title>
    <!-- Modern typography styling loaded from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="/favicon.ico" type="image/svg+xml">
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <h1 class="app-title">Task Manager</h1>
            <div class="header-actions">
                <button id="theme-toggle" class="btn btn-secondary" aria-label="Toggle Dark/Light Mode">
                    Toggle Dark Mode
                </button>
            </div>
        </div>
    </header>

    <main class="app-container">
        <!-- Sidebar containing Task Addition Form and AI Helpers -->
        <aside class="sidebar">
            <section class="card" aria-labelledby="form-heading">
                <h2 id="form-heading" class="card-title">Create Task</h2>
                


                <!-- Core task create/edit form -->
                <form id="task-form">
                    <input type="hidden" id="task-id-field" value="">
                    
                    <div class="form-group">
                        <label for="task-title" class="field-label required">Task Title</label>
                        <input type="text" id="task-title" class="form-input" required minlength="1" maxlength="100"
                               placeholder="Enter task name...">
                    </div>

                    <div class="form-group">
                        <label for="task-desc" class="field-label">Description</label>
                        <textarea id="task-desc" class="form-textarea" rows="3" maxlength="2000"
                                  placeholder="Provide optional details..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="task-priority" class="field-label">Priority</label>
                            <select id="task-priority" class="form-select">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="task-category" class="field-label">Category</label>
                            <select id="task-category" class="form-select">
                                <option value="work">Work</option>
                                <option value="personal">Personal</option>
                                <option value="shopping">Shopping</option>
                                <option value="other" selected>Other</option>
                                <option value="custom">+ Add Custom...</option>
                            </select>
                        </div>
                    </div>

                    <div id="custom-category-group" class="form-group hidden">
                        <label for="task-custom-category" class="field-label">Custom Category Name</label>
                        <input type="text" id="task-custom-category" class="form-input" placeholder="e.g. gym, health, code" maxlength="50">
                    </div>

                    <div class="form-group">
                        <label for="task-due-date" class="field-label">Due Date</label>
                        <div style="display: flex; gap: var(--spacing-sm); align-items: center; margin-bottom: var(--spacing-xs);">
                            <input type="date" id="task-due-date" class="form-input">
                            <label style="display: flex; align-items: center; gap: 4px; font-size: 11px; cursor: pointer; white-space: nowrap; user-select: none;">
                                <input type="checkbox" id="add-time-checkbox" style="width: 14px; height: 14px; cursor: pointer;" checked>
                                Add Time
                            </label>
                        </div>
                        <input type="time" id="task-due-time" class="form-input">
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="form-submit-btn" class="btn btn-primary btn-full">
                            Save Task
                        </button>
                        <button type="button" id="form-cancel-btn" class="btn btn-secondary btn-full hidden">
                            Cancel Edit
                        </button>
                    </div>
                </form>
            </section>
        </aside>

        <!-- Main Task List Area -->
        <section class="task-board" aria-labelledby="board-heading">
            <h2 id="board-heading" class="visually-hidden">Task Board</h2>
            
            <!-- Filter, Search, and Status bar -->
            <div class="board-controls card">
                <div class="search-box">
                    <label for="search-input" class="visually-hidden">Search tasks</label>
                    <input type="text" id="search-input" class="form-input" placeholder="Search tasks by name or text...">
                </div>
                
                <div class="filter-row">
                    <div class="filter-tabs" role="tablist" aria-label="Task completion filter">
                        <button class="filter-tab active" role="tab" aria-selected="true" data-filter="all">All</button>
                        <button class="filter-tab" role="tab" aria-selected="false" data-filter="active">Active</button>
                        <button class="filter-tab" role="tab" aria-selected="false" data-filter="completed">Completed</button>
                    </div>

                    <div class="sort-selector">
                        <label for="sort-select" class="visually-hidden">Sort tasks</label>
                        <select id="sort-select" class="form-select">
                            <option value="created_desc">Newest First</option>
                            <option value="due_asc">Due Date (Soonest)</option>
                            <option value="priority_desc">Priority (High to Low)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Stats dashboard and quick actions -->
            <div class="board-summary">
                <div id="stats-counter" class="stats-text" aria-live="polite">
                    Loading tasks...
                </div>
                <button type="button" id="clear-completed-btn" class="btn btn-secondary btn-sm">
                    Clear Completed
                </button>
            </div>

            <!-- Notification banner for feedback alerts -->
            <div id="alert-banner" class="alert hidden" role="alert" aria-live="assertive"></div>

            <!-- Task lists container -->
            <div id="tasks-container" class="tasks-list">
                <!-- Javascript will inject task elements here -->
            </div>
        </section>
    </main>

    <footer class="app-footer">
        <div class="footer-container">
            <p>Amplify Federal &mdash; Intern Applied AI Assessment &mdash; Summer 2026</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
